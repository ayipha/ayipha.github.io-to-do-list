<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>To Do List! · simpel</title>
  <!-- Font & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #ede9fa 0%, #dcd4f5 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* card utama */
    .modern-todo {
      max-width: 700px;
      width: 100%;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 2.8rem;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 30px 60px -20px rgba(38, 22, 94, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
      padding: 2rem 1.8rem;
      transition: padding 0.2s;
    }

    @media (max-width: 480px) {
      .modern-todo {
        padding: 1.5rem 1.2rem;
        border-radius: 2.2rem;
      }
    }

    /* header */
    .header-todo {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem 0.75rem;
      margin-bottom: 2.2rem;
    }

    .header-icon {
      font-size: 2.2rem;
      color: #3f2e8c;
      background: rgba(255, 255, 255, 0.6);
      padding: 0.7rem;
      border-radius: 1.5rem;
      box-shadow: 0 10px 15px -12px #3f2e8c;
    }

    .header-todo h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(150deg, #2b1b5c, #503ca8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    .counter-pill {
      background: rgba(79, 61, 168, 0.18);
      color: #382d6b;
      font-weight: 550;
      font-size: 0.9rem;
      padding: 0.4rem 1.1rem;
      border-radius: 40px;
      margin-left: auto;
      border: 1px solid rgba(255,255,255,0.6);
      backdrop-filter: blur(4px);
      white-space: nowrap;
    }

    /* input area */
    .input-group {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 4rem;
      padding: 0.3rem 0.3rem 0.3rem 1.5rem;
      margin-bottom: 2.4rem;
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 8px 16px -12px #3a2e6b;
      transition: 0.2s;
    }

    .input-group:focus-within {
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 12px 26px -14px #4a3996;
      border-color: #c1b3f0;
    }

    .input-group input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 1rem 0.5rem 1rem 0;
      font-size: 1.1rem;
      font-weight: 450;
      color: #1f1939;
      outline: none;
      min-width: 0;
    }

    .input-group input::placeholder {
      color: #a496cf;
      font-weight: 350;
    }

    .input-group button {
      background: #4f3da8;
      border: none;
      color: white;
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 3rem;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.15s;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 8px 18px -10px #4f3da8;
      flex-shrink: 0;
    }

    .input-group button:hover {
      background: #3b2b7a;
      transform: scale(0.95);
    }

    .input-group button:active {
      transform: scale(0.92);
    }

    /* filter bar — hanya dua tombol: semua & selesai */
    .filter-section {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 2rem;
      background: rgba(255, 255, 255, 0.3);
      padding: 0.4rem;
      border-radius: 3rem;
      border: 1px solid rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(4px);
      width: fit-content;
    }

    .filter-option {
      border: none;
      background: transparent;
      padding: 0.6rem 1.8rem;
      border-radius: 3rem;
      font-size: 0.95rem;
      font-weight: 530;
      color: #352b5e;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .filter-option i {
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .filter-option.active {
      background: white;
      color: #31236b;
      box-shadow: 0 6px 14px -8px #231c42;
      border: 1px solid rgba(255,255,255,0.9);
    }

    .filter-option:not(.active):hover {
      background: rgba(255, 255, 255, 0.5);
    }

    /* task list container */
    .tasks-container {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 2rem;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .tasks-container::-webkit-scrollbar {
      width: 6px;
    }

    .tasks-container::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.4);
      border-radius: 20px;
    }

    .tasks-container::-webkit-scrollbar-thumb {
      background: #b2a3e3;
      border-radius: 20px;
    }

    /* item tugas */
    .task-item {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      padding: 0.7rem 0.7rem 0.7rem 1.3rem;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 4px 12px -8px rgba(0,0,0,0.1);
      transition: 0.15s;
    }

    .task-item:hover {
      background: rgba(255, 255, 255, 0.8);
      border-color: #c7b9f0;
    }

    /* checkbox custom */
    .task-check {
      appearance: none;
      -webkit-appearance: none;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      border: 2.5px solid #b1a2db;
      background: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.1s;
      flex-shrink: 0;
    }

    .task-check:checked {
      background: #4f3da8;
      border-color: #4f3da8;
      box-shadow: 0 6px 12px -5px #6b5bb5;
    }

    .task-check:checked::after {
      content: "\f00c";
      font-family: "Font Awesome 6 Free";
      font-weight: 900;
      font-size: 1.1rem;
      color: white;
    }

    .task-text {
      flex: 1;
      font-size: 1.1rem;
      font-weight: 470;
      color: #1c153b;
      word-break: break-word;
      padding: 0.2rem 0;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: #9488c2;
      font-weight: 380;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: #b7a9de;
      font-size: 1.3rem;
      width: 2.6rem;
      height: 2.6rem;
      border-radius: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: rgba(255, 255, 255, 0.7);
      color: #cf5a5a;
    }

    /* footer statistik */
    .footer-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem 1rem;
      color: #3d3170;
      font-weight: 470;
      padding: 0.8rem 0.2rem 0.2rem;
      border-top: 1px dashed rgba(79, 61, 168, 0.3);
    }

    .stats-group {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .stats-group span i {
      margin-right: 6px;
      color: #6c5bb0;
    }

    #clear-completed-btn {
      background: transparent;
      border: 1px solid rgba(79, 61, 168, 0.25);
      padding: 0.5rem 1.3rem;
      border-radius: 3rem;
      font-weight: 500;
      color: #4f3da8;
      cursor: pointer;
      transition: 0.15s;
      backdrop-filter: blur(2px);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    #clear-completed-btn:hover {
      background: rgba(255, 255, 255, 0.7);
      border-color: #a08cd6;
    }

    /* empty state */
    .empty-placeholder {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #877bb0;
      font-style: italic;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 3rem;
      backdrop-filter: blur(2px);
      border: 1.5px dashed #cabcf0;
      font-weight: 350;
    }

    .empty-placeholder i {
      font-size: 2.8rem;
      opacity: 0.5;
      margin-bottom: 0.5rem;
    }

    /* responsif kecil */
    @media (max-width: 400px) {
      .filter-option {
        padding: 0.5rem 1.2rem;
        font-size: 0.85rem;
      }
      .header-todo h1 {
        font-size: 1.9rem;
      }
      .counter-pill {
        font-size: 0.8rem;
        padding: 0.3rem 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="modern-todo">
    <!-- header -->
    <div class="header-todo">
      <i class="fa-regular fa-pen-to-square header-icon"></i>
      <h1>To Do List!</h1>
      <span class="counter-pill" id="total-items">0 items</span>
    </div>

    <!-- input tugas -->
    <div class="input-group">
      <input type="text" id="todo-input" placeholder="tulis tugas baru..." autofocus>
      <button id="add-todo-btn"><i class="fa-solid fa-plus"></i></button>
    </div>

    <!-- filter: semua & selesai (on proses dihapus) -->
    <div class="filter-section">
      <button class="filter-option active" id="filter-all"><i class="fa-regular fa-circle"></i> semua</button>
      <button class="filter-option" id="filter-completed"><i class="fa-regular fa-circle-check"></i> selesai</button>
    </div>

    <!-- daftar tugas (kosong awal) -->
    <ul class="tasks-container" id="tasks-list"></ul>

    <!-- footer -->
    <div class="footer-info">
      <div class="stats-group">
        <span id="total-stat"><i class="fa-regular fa-list"></i> <span id="total-number">0</span> total</span>
        <span id="completed-stat"><i class="fa-regular fa-circle-check"></i> <span id="completed-number">0</span> selesai</span>
      </div>
      <button id="clear-completed-btn"><i class="fa-regular fa-trash-can"></i> hapus selesai</button>
    </div>
  </div>

  <script>
    (function() {
      // State awal: kosong
      let tasks = [];

      // Elemen DOM
      const taskListEl = document.getElementById('tasks-list');
      const inputField = document.getElementById('todo-input');
      const addBtn = document.getElementById('add-todo-btn');
      const filterAll = document.getElementById('filter-all');
      const filterCompleted = document.getElementById('filter-completed');
      const totalSpan = document.getElementById('total-items');
      const totalNumberSpan = document.getElementById('total-number');
      const completedNumberSpan = document.getElementById('completed-number');
      const clearCompletedBtn = document.getElementById('clear-completed-btn');

      // Filter aktif: 'all' atau 'completed'
      let currentFilter = 'all';

      // localStorage
      function saveToStorage() {
        localStorage.setItem('todoListSimple', JSON.stringify(tasks));
      }

      function loadFromStorage() {
        const saved = localStorage.getItem('todoListSimple');
        if (saved) {
          try {
            tasks = JSON.parse(saved);
          } catch (e) {
            tasks = [];
          }
        } else {
          tasks = []; // KOSONG MULAI
        }
      }

      // render tugas berdasarkan filter
      function render() {
        let filtered = tasks;
        if (currentFilter === 'completed') {
          filtered = tasks.filter(t => t.completed);
        }

        // update class active pada filter
        filterAll.classList.remove('active');
        filterCompleted.classList.remove('active');
        if (currentFilter === 'all') filterAll.classList.add('active');
        else if (currentFilter === 'completed') filterCompleted.classList.add('active');

        taskListEl.innerHTML = '';

        if (filtered.length === 0) {
          const emptyLi = document.createElement('li');
          emptyLi.className = 'empty-placeholder';
          emptyLi.innerHTML = `<i class="fa-regular fa-face-smile"></i><br>~ belum ada tugas ~`;
          taskListEl.appendChild(emptyLi);
        } else {
          filtered.forEach(task => {
            const li = document.createElement('li');
            li.className = `task-item ${task.completed ? 'completed' : ''}`;
            li.dataset.id = task.id;

            const chk = document.createElement('input');
            chk.type = 'checkbox';
            chk.className = 'task-check';
            chk.checked = task.completed;
            chk.addEventListener('change', () => toggleCompleted(task.id));

            const txt = document.createElement('span');
            txt.className = 'task-text';
            txt.textContent = task.text;

            const del = document.createElement('button');
            del.className = 'delete-btn';
            del.innerHTML = '<i class="fa-regular fa-trash-can"></i>';
            del.addEventListener('click', () => deleteTask(task.id));

            li.appendChild(chk);
            li.appendChild(txt);
            li.appendChild(del);
            taskListEl.appendChild(li);
          });
        }

        updateStats();
      }

      // update statistik
      function updateStats() {
        const total = tasks.length;
        const completed = tasks.filter(t => t.completed).length;

        totalSpan.textContent = `${total} item${total !== 1 ? 's' : ''}`;
        totalNumberSpan.textContent = total;
        completedNumberSpan.textContent = completed;
      }

      // operasi CRUD
      function addTask() {
        const text = inputField.value.trim();
        if (text === '') {
          inputField.style.outline = '2px solid #f0aaaa';
          inputField.focus();
          return;
        }
        inputField.style.outline = 'none';

        const newTask = {
          id: Date.now() + Math.floor(Math.random() * 1000),
          text: text,
          completed: false
        };
        tasks.push(newTask);
        inputField.value = '';
        saveToStorage();
        render();
        inputField.focus();
      }

      function toggleCompleted(id) {
        const task = tasks.find(t => t.id === id);
        if (task) {
          task.completed = !task.completed;
          saveToStorage();
          render();
        }
      }

      function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        saveToStorage();
        render();
      }

      function clearCompletedTasks() {
        tasks = tasks.filter(t => !t.completed);
        saveToStorage();
        render();
      }

      // event listeners
      addBtn.addEventListener('click', (e) => {
        e.preventDefault();
        addTask();
      });

      inputField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          addTask();
        }
      });

      inputField.addEventListener('input', () => {
        inputField.style.outline = 'none';
      });

      filterAll.addEventListener('click', () => {
        currentFilter = 'all';
        render();
      });

      filterCompleted.addEventListener('click', () => {
        currentFilter = 'completed';
        render();
      });

      clearCompletedBtn.addEventListener('click', () => {
        clearCompletedTasks();
      });

      // inisialisasi
      loadFromStorage();
      render();
    })();
  </script>
</body>
</html>
